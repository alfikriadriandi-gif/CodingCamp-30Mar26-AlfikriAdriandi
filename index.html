<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetVisual | Smart Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <header class="main-header">
            <div class="brand">
                <div class="logo-icon"><i data-lucide="wallet"></i></div>
                <h1>BudgetVisual</h1>
            </div>
            <button id="theme-toggle" class="theme-btn">
                <i data-lucide="moon" class="moon-icon"></i>
                <i data-lucide="sun" class="sun-icon"></i>
            </button>
        </header>

        <main class="content-grid">
            <section class="card balance-card">
                <p class="label">Total Pengeluaran Bulan Ini</p>
                <h2 id="total-balance">Rp 0</h2>
                <div class="balance-badge">Aktif</div>
            </section>

            <section class="card chart-card">
                <div class="card-header">
                    <h3>Distribusi Kategori</h3>
                </div>
                <div class="chart-wrapper">
                    <canvas id="expenseChart"></canvas>
                </div>
            </section>

            <section class="card form-card">
                <h3>Transaksi Baru</h3>
                <form id="expense-form">
                    <div class="input-group">
                        <label>Nama Item</label>
                        <input type="text" id="item-name" placeholder="Misal: Kopi Susu" required>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Harga</label>
                            <input type="number" id="item-amount" placeholder="0" required>
                        </div>
                        <div class="input-group">
                            <label>Kategori</label>
                            <div class="select-wrapper">
                                <select id="item-category" required></select>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="add-category-btn" class="btn-ghost">+ Kategori Baru</button>
                        <button type="submit" class="btn-primary">Simpan</button>
                    </div>
                </form>
            </section>

            <section class="card history-card">
                <div class="card-header">
                    <h3>Riwayat Transaksi</h3>
                    <select id="sort-options" class="sort-select">
                        <option value="newest">Terbaru</option>
                        <option value="amount-high">Termahal</option>
                        <option value="category">Kategori</option>
                    </select>
                </div>
                <div class="list-container">
                    <ul id="transaction-list">
                        </ul>
                </div>
            </section>
        </main>
    </div>

    <script src="js/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
